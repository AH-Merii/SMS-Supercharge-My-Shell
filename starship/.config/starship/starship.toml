"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
scan_timeout = 20
command_timeout = 1000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$git_state\
$fill\
$python\
$pixi\
$nodejs\
$deno\
$bun\
$rust\
$golang\
$zig\
$c\
$cpp\
$custom\
$direnv\
$line_break\
$status\
$character\
"""

right_format = """$docker_context${custom.podman_connection}$kubernetes$aws$azure$jobs$cmd_duration"""

# ----------------------------
# SSH identity (built-in; no custom commands)
# ----------------------------
[username]
style_user = "bold dimmed white"
style_root = "bold red"
format = "[$user]($style)@"
show_always = false

[hostname]
ssh_only = true
ssh_symbol = "¾░úÇ "
style = "bold dimmed white"
format = "[$ssh_symbol$hostname]($style) "
trim_at = "."
disabled = false

# ----------------------------
# Prompt mode (fish vi mode)
# ----------------------------
[character]
success_symbol = "[ÔØ»](bold green)"
error_symbol = "[ÔØ»](bold red)"
vimcmd_symbol = "[ÔØ«](bold green)"
vimcmd_visual_symbol = "[Ôû╝](bold green)"
vimcmd_replace_symbol = "[ÔûÂ](bold green)"
vimcmd_replace_one_symbol = "[ÔûÀ](bold green)"

[line_break]
disabled = false

[fill]
symbol = ' '

# ----------------------------
# Directory + your icons
# ----------------------------
[directory]
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 8
truncation_symbol = "ÔÇª/"
fish_style_pwd_dir_length = 1
read_only = "´Çú"
read_only_style = "red"
home_symbol = "´Çò"
repo_root_format = ""

# substitutions are literal string replacements (no glob/regex)
[directory.substitutions]
"SMS-Supercharge-My-Shell" = "¯ÜÉ SMS"

"claude/.config/claude" = "´äí claude ´Çô "
"fish/.config/fish" = "¾░ê║ ´Çô "
"ghostty/.config/ghostty" = "¾░èá ´Çô "
"git/.config/git" = "¯ÖØ ´Çô "
"karabiner/.config/karabiner" = "´ä£ karabiner ´Çô "
"kitty/.config/kitty" = "¾░äø ´Çô "
"nvim/.config/nvim" = "¯Ü« ´Çô "
"tmux/.config/tmux" = "¯»ê ´Çô "
"zsh/.config/zsh" = "¯×ò zsh ´Çô "

# Custom for AECOM
"libs" = "¯«£ "
"monopy" = "¾▒ÑÆ "
"plant-room" = "¾░êÅ "
"plant_room" = "¾░êÅ "

"claude" = "´äí claude"
"fish" = "¾░ê║ "
"ghostty" = "¾░èá "
"git" = "¯ÖØ "
"karabiner" = "´ä£ karabiner"
"kitty" = "¾░äø "
"nvim" = "¯Ü« "
"tmux" = "¯»ê "
"zsh" = "¯×ò zsh"

".git" = "¯ù╗ "
".github" = "¯ù¢ "
"workflows" = "´ö« "

".config" = "¯ù╝ "
".local" = "´ü╝ .local"
".state" = "´çÜ "
".cache" = "´çÇ "
".ssh" = "¾░ó¼ "
".npm" = "¯ù║ "

"docker" = "´êƒ "
"terraform" = "¾▒üó "

