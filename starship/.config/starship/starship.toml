# ----------------------------
# Git
# ----------------------------
[git_branch]
symbol = "¯¼º ´äª "
style = "bold white"
format = "[$symbol$branch]($style) "
truncation_length = 50
truncation_symbol = "ÔÇª"

[git_status]
format = "($all_status$ahead_behind)"

conflicted = "[¯»Ü ${count}](bold red) "
ahead = "[Ôçí${count}](green) "
behind = "[Ôçú${count}](yellow) "
diverged = "[¾░╣Â](purple) [Ôçí${ahead_count}](green) [Ôçú${behind_count}](yellow) "
untracked = "[¾░òÜ ${count}](bright-black) "
stashed = "[¯ÁÁ ${count}](fg:208) "                                             # orange
modified = "[´æÖ ${count}](yellow) "
staged = "[´æù ${count}](green) "
renamed = "[´æÜ ${count}](purple) "
deleted = "[´æÿ ${count}](dimmed red) "

[git_metrics]
disabled = false
format = "({([+$added]($added_style))( [-$deleted]($deleted_style))} )"
added_style = "green"
deleted_style = "red"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
rebase = "[¾░£ÿ rebase](fg:208)"                                        # orange
merge = "[´à┐ merge](purple)"
revert = "[¾░òî revert](red)"
cherry_pick = "[¯èø cherry-pick](purple)"
bisect = "[¯½É bisect](white)"
am = "[¾░ç░ am](blue)"
am_or_rebase = "[¾░ç░ ¾░£ÿ am/rebase](yellow)"

# ----------------------------
# Python + pixi + uv + hatch
# Priority: pixi > uv, pixi > hatch
# ----------------------------
[python]
symbol = "¯êÁ "
style = "yellow bold"
pyenv_version_name = false
format = '[$symbol](cyan)[($version )](purple)[($virtualenv )]($style)'

[pixi]
disabled = false
symbol = "Ô¼ó "
style = "yellow"
format = "[$symbol($environment )]($style)"

[custom.uv]
detect_files = ["uv.lock"]
when = """
! test -f pixi.toml && \
! test -f pixi.lock && \
! (test -f pyproject.toml && grep -q '\\[tool\\.pixi\\]' pyproject.toml)
"""
command = 'echo "¾░¼é¾░¼â"'
shell = ["sh", "-c"]
format = "[$output](bold purple) "
description = "uv project (uv.lock present, no pixi)"

[custom.hatch]
when = """
! test -f pixi.toml && \
! test -f pixi.lock && \
! (test -f pyproject.toml && grep -q '\\[tool\\.pixi\\]' pyproject.toml) && \
(test -f hatch.toml || (test -f pyproject.toml && grep -q '\\[tool\\.hatch\\]' pyproject.toml))
"""
command = 'echo "¾░¬» hatch"'
shell = ["sh", "-c"]
format = "[$output](bold yellow) "
description = "hatch project (hatch.toml or [tool.hatch], no pixi)"

# ----------------------------
# Languages (strict detection - config files only)
# ----------------------------
[nodejs]
detect_extensions = []
detect_files = ["package.json", ".node-version", ".nvmrc"]

[deno]
detect_extensions = []
detect_files = ["deno.json", "deno.jsonc", "deno.lock"]

[bun]
detect_extensions = []
detect_files = ["bun.lockb", "bunfig.toml"]

[rust]
detect_extensions = []
detect_files = ["Cargo.toml", "Cargo.lock"]

[golang]
detect_extensions = []
detect_files = ["go.mod", "go.sum"]

[zig]
detect_extensions = []
detect_files = ["build.zig", "build.zig.zon"]

[c]
symbol = "\ue61e "
style = "bold white"
detect_extensions = ["c"]
detect_files = []

[cpp]
symbol = "\ue61d "
style = "bold #659AD2"
detect_extensions = ["cpp", "cc", "cxx", "hpp", "hh", "hxx"]
detect_files = []

# ----------------------------
# Cloud
# ----------------------------
[aws]
symbol = "´ë░ "
style = "white"
format = "[$symbol$profile( \\($region\\))]($style) "
force_display = false

[azure]
symbol = "¯»ÿ "
style = "#0078D4"
format = "[$symbol($subscription)]($style) "
disabled = false

[azure.subscription_aliases]
"N/A(tenant level account)" = ""

# ----------------------------
# Ops / env tooling
# ----------------------------
[docker_context]
symbol = "´îê "
style = "blue"
format = "[$symbol$context]($style) "

[custom.podman_connection]
detect_files = ["Containerfile", "Dockerfile", "docker-compose.yml", "docker-compose.yaml", "compose.yml", "compose.yaml"]
command = 'name=$(podman machine list --format "{{if eq .Running true}}{{.Name}}{{end}}" | tr -d "\n*" | sed "s/podman-machine-//"); [ "$name" != "default" ] && echo "$name"'
when = 'podman machine list --format "{{.Running}}" 2>/dev/null | grep -q true'
symbol = "¯íª "
style = "#AF5FC1"
format = "[$symbol]($style)[podman( $output)]($style) "

[kubernetes]
symbol = "ÔÄê "
style = "dimmed cyan"
format = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false

[direnv]
disabled = false
style = "bright-black"
format = "[direnv]($style) "

# ----------------------------
# Status / jobs / duration
# ----------------------------
[status]
disabled = false
format = "[$status](bold red) "

[jobs]
symbol = "´éà"
style = "purple"
format = "[$symbol$number]($style) "

[cmd_duration]
min_time = 800
format = "[´ëÆ $duration](dimmed white)"
